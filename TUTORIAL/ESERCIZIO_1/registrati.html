<!doctype html>
<html lang="it">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Registrazione</title>
      <link rel="stylesheet" href="/TUTORIAL/ESERCIZIO/css/style.css">
  </head>
  <body>
  <header>
    <span>Registrazione</span>
    <nav>
      <ul>
        <a href="index.html"><li>Homepage</li></a>
        <a href="articolo.html" target="_blank"><li>Articolo</li></a>
      </ul>
    </nav>
    <h1>Registrati</h1>
  </header>

  <main>
    <form action="#" method="post">
      <div>
        <div >
          <label for="nome">Nome</label>
          <input type="text" name="Nome" placeholder="Inserisci il Nome" required id="nome">
        </div>
        <div>
          <label for="cognome">Cognome</label>
          <input type="text" name="Cognome" placeholder="Inserisci il Cognome" required id="cognome">
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" name="Email" placeholder="email@esempio.com" required id="email">
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" name="Password" placeholder="Inserisci Password" required id="password">
        </div>
        <div>
          <label for="confirmPassword">Conferma Password</label>
          <input type="password" name="ConfirmPassword" placeholder="Conferma Password" required id="confirmPassword">
        </div>
        <div>
          <button type="submit" id="invia">Invia</button>
          <button type="reset">Cancella tutto</button>
        </div>
      </div>
    </form>
  </main>

  <footer>
    <nav>
      <ul>
        <a href="index.html"><li>Homepage</li></a>
        <a href="articolo.html" target="_blank"><li>Articolo</li></a>
      </ul>
    </nav>
    <p>Fine pagina | Copyright</p>
  </footer>
  </body>
</html>
